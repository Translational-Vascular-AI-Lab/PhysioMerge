
#####################################################################
# PARTITION
#####################################################################
[[command]]
class_name = "partition"
in = "{name}"
index = "{index_channel_terason}"
in_channel = "{channel_name_diameter}"
out_channel = "diameter_wave"
out = "{name}"
[[command]]
class_name = "partition"
in = "{name}"
index = "{index_channel_terason}"
in_channel = "{channel_name_velocity}"
out_channel = "velocity_wave"
out = "{name}"

#####################################################################
# TAKE
#####################################################################
[[command]]
class_name = "take"
in = "{name}"
in_channel = "diameter_wave"
out_channel = "diameter_wave"
out = "{name}"
waves = 10
consecutive = true
direction = "-"
[[command]]
class_name = "take"
in = "{name}"
in_channel = "velocity_wave"
out_channel = "velocity_wave"
out = "{name}"
waves = 10
consecutive = true
direction = "-"


#####################################################################
# Check
#####################################################################
[[command]]
class_name = "check"
in = "{name}"
out = "{name}"
in_channel = "diameter_wave"
mask = "{diameter_mask_name}"
variable = "min"
format = "y"
compare = ">="
num = 0.1
[[command]]
class_name = "check"
in = "{name}"
out = "{name}"
in_channel = "velocity_wave"
mask = "{diameter_mask_name}"
variable = "min"
format = "y"
compare = ">="
num = 10.5
[[command]]
class_name = "check"
in = "{name}"
out = "{name}"
in_channel = "diameter_wave"
mask = "{diameter_mask_name}"
variable = "end"
format = "x"
compare = "<="
time = "40BPM"
[[command]]
class_name = "check"
in = "{name}"
out = "{name}"
in_channel = "diameter_wave"
mask = "{diameter_mask_name}"
variable = "end"
format = "x"
compare = ">="
time = "150BPM"

#####################################################################
# ARITHMETIC
#####################################################################
[Making_area]
[[command]]
class_name = "arithmetic"
in = "{name}"
out = "{name}"
in_channel = "diameter_wave"
in_channel_2 = "diameter_wave"
out_channel = "diameter2_wave"
format = "*"

[[command]]
class_name = "arithmetic"
in = "{name}"
out = "{name}"
in_channel = "diameter2_wave"
out_channel = "area_wave"
format = "*"
num = 0.7854 # pi/4

[[command]]
class_name = "Arithmetic"
in =  "{name}"
in_channel = "velocity_wave"
in_channel_2 =  "area_wave"
format = "*"
out_channel = "flow_wave"
out = "{name}"


