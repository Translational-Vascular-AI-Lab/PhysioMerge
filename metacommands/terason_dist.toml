# DIAMETER
#####################################################################
# Diameter
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "diameter_wave"
format = "max"
out_channel = "sys_diameter_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "diameter_wave"
format = "mean"
