# Basic
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "min"
out_channel = "dias_mcav_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "mean"
out_channel = "mean_mcav_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "max"
out_channel = "sys_mcav_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "amplitude"
out_channel = "amp_mcav_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "period"
out_channel = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "measurement"
in = "{name}"
in_channel = "{channel_name}"
format = "frequency"
out_channel = "mca_freq_wave"
out = "{name}"

# pi, ri, sd
[[command]]
class_name = "Arithmetic"
in =  "{name}"
in_channel = "amp_mcav_wave"
in_channel_2 =  "mean_mcav_wave"
format = "/"
out_channel = "pi_mcav_wave"
out = "{name}"
[[command]]
class_name = "Arithmetic"
in =  "{name}"
in_channel = "amp_mcav_wave"
in_channel_2 =  "sys_mcav_wave"
format = "/"
out_channel = "ri_mcav_wave"
out = "{name}"
[[command]]
class_name = "Arithmetic"
in =  "{name}"
in_channel = "sys_mcav_wave"
in_channel_2 =  "dias_mcav_wave"
format = "/"
out_channel = "sd_mcav_wave"
out = "{name}"
[[command]]
class_name = "Arithmetic"
in =  "{name}"
in_channel = "mca_freq_wave"
num = 60
format = "*"
out_channel = "mca_freq_wave"
out = "{name}"

# Aggregations
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "dias_mcav_wave"
format = "mean"
out_channel = "dias_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "mean_mcav_wave"
format = "mean"
