out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "sys_mcav_wave"
format = "mean"
out_channel = "sys_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "pi_mcav_wave"
format = "mean"
out_channel = "pi_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "ri_mcav_wave"
format = "mean"
out_channel = "ri_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "sd_mcav_wave"
format = "mean"
out_channel = "sd_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"

[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "amp_mcav_wave"
format = "mean"
out_channel = "amp_mcav"
mask = "{mask_name}"
weights = "mca_period_wave"
out = "{name}"
[[command]]
class_name = "aggregate"
in = "{name}"
in_channel = "amp_mcav_wave"
